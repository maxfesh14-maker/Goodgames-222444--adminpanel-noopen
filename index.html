<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG TITAN ADMIN V5.2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #050505; --card: #121212; --text: #eee; --red: #ff4444; --green: #4CAF50; --blue: #2196F3; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }

        /* ПЛАВНАЯ АНИМАЦИЯ СПИСКА */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: var(--main); text-align: center; font-size: 26px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        h2 { color: #888; font-size: 18px; margin-top: 30px; border-left: 4px solid var(--main); padding-left: 10px; }

        /* ПОИСК */
        #search { 
            width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; 
            color: #fff; border-radius: 10px; font-size: 16px; margin-bottom: 20px; outline: none;
            transition: 0.3s;
        }
        #search:focus { border-color: var(--main); box-shadow: 0 0 10px rgba(251, 192, 45, 0.2); }

        /* КАРТОЧКИ ПОЛЬЗОВАТЕЛЕЙ */
        .card { 
            background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid #222; 
            margin-bottom: 12px; animation: slideIn 0.3s ease-out forwards; position: relative;
        }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn { 
            padding: 12px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-size: 12px; transition: 0.2s; text-transform: uppercase;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-vip { background: var(--main); color: #000; }
        .btn-ver { background: var(--blue); color: #fff; }
        .btn-ban { background: var(--red); color: #fff; }
        .btn-unban { background: #444; color: #fff; }
        .btn-del { background: #222; color: #888; grid-column: span 2; border: 1px solid #333; }

        /* ИНФО-БЛОКИ */
        .nick-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .nick-name { font-size: 20px; font-weight: bold; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; margin-left: 5px; }
        .b-ban { background: var(--red); color: #fff; }
        .b-ver { background: var(--blue); color: #fff; }
        
        .info-text { font-size: 13px; color: #999; margin: 4px 0; font-family: monospace; }
        .val { color: var(--green); font-weight: bold; }
        .dev-id { background: #222; color: var(--main); padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

<h1>TITAN ADMIN V5.2</h1>

<div class="container">
    <h2>👥 УПРАВЛЕНИЕ ИГРОКАМИ</h2>
    <input type="text" id="search" placeholder="Поиск ника или DeviceID..." oninput="render()">
    <div id="u_list">Подключение к базе данных...</div>
</div>

<script>
    // Твой конфиг Firebase (оставь свой)
    const firebaseConfig = { apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allUsers = {};

    // Загрузка в реальном времени
    db.ref('users').on('value', s => {
        allUsers = s.val() || {};
        render();
    });

    function render() {
        const list = document.getElementById('u_list');
        const query = document.getElementById('search').value.toLowerCase();
        list.innerHTML = "";

        Object.entries(allUsers).forEach(([nick, u]) => {
            if(nick.toLowerCase().includes(query) || (u.deviceID && u.deviceID.toLowerCase().includes(query))) {
                const card = document.createElement('div');
                card.className = 'card';
                
                const isBanned = u.ban || u.deviceID_ban;

                card.innerHTML = `
                    <div class="nick-row">
                        <span class="nick-name">${nick} 
                            ${u.vip ? '<span class="badge" style="background:var(--main); color:#000">VIP</span>' : ''}
                            ${u.verified ? '<span class="badge b-ver">VERIFIED</span>' : ''}
                            ${isBanned ? '<span class="badge b-ban">BANNED</span>' : ''}
                        </span>
                    </div>

                    <div class="info-text">Пароль: <span class="val">${u.pass}</span></div>
                    <div class="info-text">DeviceID: <span class="dev-id">${u.deviceID || 'Неизвестно'}</span></div>
                    
                    <div class="btn-grid">
                        <button class="btn btn-vip" onclick="upd('${nick}', 'vip', ${!u.vip})">${u.vip?'Снять VIP':'Дать VIP'}</button>
                        <button class="btn btn-ver" onclick="upd('${nick}', 'verified', ${!u.verified})">${u.verified?'Снять Verify':'Дать Verify'}</button>
                        
                        ${isBanned ? 
                            `<button class="btn btn-unban" onclick="unban('${nick}')">🔓 РАЗБАНИТЬ</button>` : 
                            `<button class="btn btn-ban" onclick="ban('${nick}', '${u.deviceID}')">🚫 ЗАБАНЬ ПО ID</button>`
                        }
                        
                        <button class="btn btn-del" onclick="delUser('${nick}')">УДАЛИТЬ АККАУНТ ПОЛНОСТЬЮ</button>
                    </div>
                `;
                list.appendChild(card);
            }
        });
    }

    // Функции управления
    function upd(n, f, v) { db.ref('users/' + n).update({ [f]: v }); }

    function ban(n, dev) {
        if(confirm("Забанить игрока " + n + " по устройству?")) {
            db.ref('users/' + n).update({ ban: true, deviceID_ban: dev || "unknown" });
        }
    }

    function unban(n) {
        if(confirm("Разблокировать игрока " + n + "?")) {
            db.ref('users/' + n).update({ ban: false, deviceID_ban: null });
        }
    }

    function delUser(n) {
        if(confirm("Внимание! Удаление " + n + " нельзя отменить. Удалить?")) {
            db.ref('users/' + n).remove();
        }
    }
</script>
</body>
</html>
