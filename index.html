<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN ADMIN V8.6 - ANIMATED BUTTONS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #FBC02D; --bg: #050505; --card: #121212; --text: #eee; --red: #ff3333; --blue: #2196F3; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }

        /* ОБЩАЯ АНИМАЦИЯ КАРТОЧЕК */
        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .card { 
            background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; 
            margin-bottom: 12px; animation: slideIn 0.3s ease-out forwards;
        }

        /* --- АНИМАЦИИ КНОПОК --- */
        .btn { 
            padding: 12px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; text-transform: uppercase; font-size: 11px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); /* Плавный переход */
            position: relative; overflow: hidden; outline: none;
        }

        /* Эффект при наведении */
        .btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px); /* Кнопка чуть приподнимается */
        }

        /* Эффект нажатия (Scale Down) */
        .btn:active {
            transform: scale(0.92); /* Кнопка сжимается */
            filter: brightness(0.9);
        }

        /* Специфические цвета со свечением */
        .btn-vip { 
            background: var(--main); color: #000; 
            box-shadow: 0 0 5px rgba(251, 192, 45, 0.2); 
        }
        .btn-vip:hover { box-shadow: 0 0 15px rgba(251, 192, 45, 0.4); }

        .btn-ver { 
            background: var(--blue); color: #fff; 
        }
        .btn-ver:hover { box-shadow: 0 0 15px rgba(33, 150, 243, 0.4); }

        .btn-del { 
            background: #1a1a1a; color: #666; border: 1px solid #333; 
            grid-column: span 2;
        }
        .btn-del:hover { background: var(--red); color: #fff; border-color: var(--red); }

        /* ЭКРАНЫ */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .container { max-width: 800px; margin: 0 auto; display: none; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin: 8px 0; outline: none; }
        #logs-container { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; padding: 10px; height: 120px; overflow-y: auto; font-size: 11px; color: #888; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2 style="color:var(--main)">TITAN ADMIN LOGIN</h2>
    <div style="width:280px;">
        <input type="text" id="admin-login" placeholder="Ник на портале">
        <input type="password" id="admin-pass" placeholder="Пароль">
        <button class="btn btn-vip" style="width:100%;" onclick="tryLogin()">ВОЙТИ</button>
    </div>
</div>

<div id="admin-content" class="container">
    <h1>TITAN ADMIN <span style="color:#fff; font-size:12px;">V8.6</span></h1>
    
    <div class="card" style="border-color: var(--main); animation-delay: 0.1s;">
        <h3 style="margin:0 0 10px 0; color:var(--main); font-size:14px;">📜 ИСТОРИЯ ДЕЙСТВИЙ</h3>
        <div id="logs-container"></div>
    </div>

    <input type="text" id="u-search" placeholder="Поиск ника..." oninput="render()">
    <div id="user-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCD1HEwz_NsJDasETxc6X4IdCJ6_WFj-LA", databaseURL: "https://goodgames-222444-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = "";
    let users = {};

    function tryLogin() {
        const nick = document.getElementById('admin-login').value.trim();
        const pass = document.getElementById('admin-pass').value.trim();
        db.ref('users/' + nick).once('value', s => {
            const u = s.val();
            if (u && u.pass === pass && (u.vip || u.verified)) {
                currentUser = nick;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                startSystem();
            } else { alert("Отказ в доступе!"); }
        });
    }

    function startSystem() {
        db.ref('admin_logs').limitToLast(10).on('value', s => {
            const logBox = document.getElementById('logs-container');
            logBox.innerHTML = "";
            if(s.val()) {
                Object.values(s.val()).reverse().forEach(l => {
                    logBox.innerHTML += `<div>[${l.time}] <b>${l.who}:</b> ${l.text}</div>`;
                });
            }
        });
        db.ref('users').on('value', s => { users = s.val() || {}; render(); });
    }

    function render() {
        const uList = document.getElementById('user-list');
        const q = document.getElementById('u-search').value.toLowerCase();
        uList.innerHTML = "<h2>👥 ИГРОКИ</h2>";

        Object.entries(users).forEach(([nick, u], index) => {
            if(nick.toLowerCase().includes(q)) {
                const card = document.createElement('div');
                card.className = 'card';
                // Добавляем задержку анимации для каждой карточки, чтобы они выплывали по очереди
                card.style.animationDelay = (index * 0.05) + 's';
                card.innerHTML = `
                    <b>${nick} ${u.verified?'✅':''}</b>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;">
                        <button class="btn btn-vip" onclick="safeUpd('${nick}', 'vip', ${!u.vip})">VIP</button>
                        <button class="btn btn-ver" onclick="safeUpd('${nick}', 'verified', ${!u.verified})">Verify</button>
                        <button class="btn btn-del" onclick="secureDelete('${nick}')">УДАЛИТЬ</button>
                    </div>
                `;
                uList.appendChild(card);
            }
        });
    }

    function safeUpd(nick, f, v) {
        if(confirm("Изменить статус?")) {
            db.ref('users/'+nick).update({ [f]: v });
            const now = new Date().toLocaleTimeString();
            db.ref('admin_logs').push({ time: now, who: currentUser, text: `Сменил ${f} для ${nick}` });
        }
    }

    function secureDelete(nick) {
        if(prompt(`Введите УДАЛИТЬ для подтверждения: ${nick}`) === "УДАЛИТЬ") {
            db.ref('users/'+nick).remove();
            const now = new Date().toLocaleTimeString();
            db.ref('admin_logs').push({ time: now, who: currentUser, text: `Удалил игрока ${nick}` });
        }
    }
</script>
</body>
</html>
